<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uhnime cc guesser</title>
<link rel="stylesheet" href="anime_guesser.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Uhnime cc guesser</h1>

        <div class="stats">
            <div class="stat">
                <h2 id="score">0</h2>
                <p>Score</p>
            </div>

            <div class="stat">
                <h2 id="highscore">0</h2>
                <p>High Score</p>
            </div>
        </div>

        <div id="clues"></div>

        <input list="chars" id="guessInput" placeholder="Guess the character name">

        <datalist id="chars"></datalist>

        <br>

        <button class="guess" onclick="submitGuess()">Guess</button>
        <button class="hint" onclick="showHint()">I-Its not like i am helping you or anything!</button>
        <button class="next" id="nextBtn" onclick="nextCharacter()">Next Character</button>

        <div id="result"></div>
    </div>
</div>

<script src="anime_guesser.js"></script>
</body>
</html>
